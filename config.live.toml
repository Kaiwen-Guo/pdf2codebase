[llm]
llm_provider = "openai"
model_name = "gpt-4.1-mini"
api_key_env = "OPENAI_API_KEY"
temperature = 0.1
max_tokens = 8192
use_llm_for_testplan = true
use_llm_for_code = true
use_llm_for_tests = true

[storage]
database_path = "verifaix.live.db"
artifacts_dir = "artifacts"

[extraction]
use_ocr = true
ocr_mode = "auto"
min_text_chars = 200
ocr_dpi = 200
use_vision_for_images = false
vision_mode = "auto"
max_vision_pages = 4
vision_dpi = 150

[runtime]
module_name = "generated_module"
fallback_to_deterministic = false
